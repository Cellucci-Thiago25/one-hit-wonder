<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <style>
@import url('https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,500;0,700;1,400&family=Inter:wght@300;400;500;600&display=swap');

/* =============================================
   VARIABLES GLOBALES
   ============================================= */
:root {
  --naranja: #D45E2A;
  --naranja-claro: #E8896A;
  --naranja-oscuro: #B84D1F;
  --beige: #F2EDE4;
  --beige-osc: #E8E0D4;
  --beige-borde: #DDD8CE;
  --negro: #1A1A1A;
  --texto-principal: #1A1A1A;
  --texto-secundario: #6A6460;
  --texto-terciario: #A09890;
  --texto-muted: #C4BDB5;
  --radio: 20px;
  --radio-lg: 28px;
}

/* =============================================
   RESET & BASE
   ============================================= */
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

html, body {
  height: 100%;
  font-family: 'Inter', sans-serif;
  background: var(--naranja);
  color: var(--texto-principal);
  -webkit-font-smoothing: antialiased;
}

/* =============================================
   LAYOUT PRINCIPAL
   ============================================= */
.app-shell {
  min-height: 100vh;
  display: flex;
  flex-direction: column;
  background: var(--naranja);
  padding: 12px;
  gap: 10px;
}

/* =============================================
   NAVEGACIÓN
   ============================================= */
.nav {
  display: flex;
  align-items: center;
  justify-content: space-between;
  padding: 10px 16px;
  background: var(--negro);
  border-radius: var(--radio);
}

.nav-brand {
  font-family: 'Playfair Display', serif;
  font-size: 14px;
  font-weight: 700;
  color: var(--beige);
  letter-spacing: 0.5px;
}

.nav-links {
  display: flex;
  gap: 4px;
}

.nav-link {
  font-size: 11px;
  font-weight: 500;
  color: var(--texto-terciario);
  text-decoration: none;
  padding: 6px 14px;
  border-radius: 10px;
  letter-spacing: 1px;
  text-transform: uppercase;
  transition: all 0.2s;
}

.nav-link:hover { color: var(--beige); background: rgba(255,255,255,0.06); }
.nav-link.active { background: var(--naranja); color: white; }

/* =============================================
   PANELS / CARDS
   ============================================= */
.panel {
  background: var(--beige);
  border-radius: var(--radio);
  padding: 14px;
}

.panel-dark {
  background: var(--beige);
  border: 2.5px solid var(--negro);
  border-radius: var(--radio);
  padding: 14px;
}

.panel-warm {
  background: var(--beige);
  border: 2.5px solid var(--naranja);
  border-radius: var(--radio);
  padding: 14px;
}

.panel-label {
  font-size: 9px;
  font-weight: 600;
  letter-spacing: 2.5px;
  text-transform: uppercase;
  color: var(--negro);
  margin-bottom: 10px;
}

/* =============================================
   STATS ROW
   ============================================= */
.stats-row {
  display: grid;
  grid-template-columns: repeat(4, 1fr);
  gap: 8px;
}

.stat {
  background: var(--beige);
  border-radius: 14px;
  padding: 10px 14px;
}

.stat-label {
  font-size: 8px;
  font-weight: 500;
  color: var(--texto-terciario);
  letter-spacing: 1.5px;
  text-transform: uppercase;
  margin-bottom: 2px;
}

.stat-val {
  font-family: 'Playfair Display', serif;
  font-size: 24px;
  font-weight: 700;
  color: var(--naranja-oscuro);
  line-height: 1;
}

/* =============================================
   BÚSQUEDA
   ============================================= */
.search-wrap {
  position: relative;
}

.search-wrap i {
  position: absolute;
  left: 12px;
  top: 50%;
  transform: translateY(-50%);
  font-size: 14px;
  color: var(--texto-terciario);
  pointer-events: none;
}

.search-wrap input {
  width: 100%;
  font-size: 12px;
  padding: 10px 12px 10px 34px;
  border-radius: 12px;
  border: none;
  background: var(--beige);
  color: var(--texto-principal);
  outline: none;
  font-family: 'Inter', sans-serif;
}

.search-wrap input::placeholder { color: var(--texto-muted); }
.search-wrap input:focus { box-shadow: 0 0 0 2px var(--naranja-claro); }

/* =============================================
   TABLA
   ============================================= */
.table-panel {
  background: var(--beige);
  border: 2.5px solid var(--negro);
  border-radius: var(--radio);
  overflow: hidden;
  position: relative;
}

.table-scroll {
  overflow-x: auto;
  overflow-y: auto;

}

.table-scroll::-webkit-scrollbar { width: 3px; height: 3px; }
.table-scroll::-webkit-scrollbar-track { background: var(--beige-borde); }
.table-scroll::-webkit-scrollbar-thumb { background: var(--naranja); border-radius: 2px; }

table { border-collapse: collapse; width: 100%; }
thead { position: sticky; top: 0; z-index: 10; }

thead th {
  background: var(--negro);
  color: var(--beige);

}

thead th:hover { background: #2a2a2a; }
thead th.active-filter { color: var(--naranja-claro); }

tbody tr {

tbody tr:hover { background: var(--beige-osc); }

tbody tr.selected { background: var(--negro); }

td {

  color: var(--texto-secundario);
  padding: 8px 8px;
  white-space: nowrap;
  overflow: hidden;
  text-overflow: ellipsis;
}

td.rank {

  text-align: center;

  font-size: 12px;
}

td.name { color: var(--negro); font-weight: 500; max-width: 130px; }
td.num { text-align: center; }

td.final {

}

.mini-bar { height: 2px; background: var(--beige-borde); border-radius: 1px; margin-top: 3px; }
.mini-fill { height: 2px; background: var(--naranja); border-radius: 1px; opacity: 0.7; }
.no-results {

  color: var(--texto-terciario);
  font-style: italic;
  font-family: 'Playfair Display', serif;
}

/* =============================================
   DROPDOWN FILTRO (tipo Excel)

.filter-dropdown {

.dd-list { max-height: 150px; overflow-y: auto; display: flex; flex-direction: column; gap: 2px; }
.dd-list::-webkit-scrollbar { width: 3px; }
.dd-list::-webkit-scrollbar-thumb { background: var(--naranja); border-radius: 2px; }

.dd-item { display: flex; align-items: center; gap: 6px; padding: 4px 5px; border-radius: 5px; cursor: pointer; }
.dd-item:hover { background: #2a2a2a; }
.dd-item input[type=checkbox] { accent-color: var(--naranja); cursor: pointer; width: 12px; height: 12px; flex-shrink: 0; }

  padding: 6px;
  border-radius: 6px;
  font-size: 10px;
  font-family: 'Inter', sans-serif;
  cursor: pointer;
  letter-spacing: 0.5px;
  font-weight: 500;
}

.dd-apply:hover { background: var(--naranja-oscuro); }

/* =============================================
   SCROLLBAR GLOBAL

.custom-scroll::-webkit-scrollbar { width: 3px; }
.custom-scroll::-webkit-scrollbar-track { background: var(--beige-borde); border-radius: 2px; }
.custom-scroll::-webkit-scrollbar-thumb { background: var(--naranja); border-radius: 2px; }

/* =============================================
   BOTONES

.btn-dark {
  background: var(--negro);

  padding: 10px 20px;

.btn-outline {

<script>


let DISCOS = [];
let TRACKS = [];

const APP = {
  setSelected(disco) {
    try { localStorage.setItem('selectedDisco', disco ? String(disco.id) : null); } catch(e) {}
  },
  getSelected() {
    try {
      const id = localStorage.getItem('selectedDisco');
      return id ? (DISCOS.find(d => d.id === parseInt(id)) || DISCOS[0]) : DISCOS[0];
    } catch(e) { return DISCOS[0]; }
  }
};

function parseCSV(text) {
  const lines = text.trim().split('
');
  const headers = lines[0].split(',').map(h => h.trim().replace(/^"|"$/g,''));
  return lines.slice(1).map(line => {
    const vals = []; let cur = '', inQ = false;
    for (let ch of line) {
      if (ch==='"') inQ=!inQ;
      else if (ch===',' && !inQ) { vals.push(cur.trim()); cur=''; }
      else cur+=ch;
    }
    vals.push(cur.trim());
    const obj = {};
    headers.forEach((h,i) => obj[h] = (vals[i]||'').replace(/^"|"$/g,''));
    return obj;
  }).filter(r => Object.values(r).some(v => v && v.trim()));
}

function getVal(row, ...keys) {
  for (const k of keys) {
    if (row[k] !== undefined && row[k] !== '') return row[k];
  }
  return '';
}

function mapDisco(row) {
  const c = parseFloat(getVal(row,'Punt. Canciones (40%)')||0);
  const k = parseFloat(getVal(row,'Punt. Concepto (25%)')||0);
  const v = parseFloat(getVal(row,'Punt. Visual (25%)')||0);
  const a = parseFloat(getVal(row,'Pts. Adicionales (10%)')||0);
  // Find cita a ciegas column regardless of accent
  const ciegasKey = Object.keys(row).find(k => k.toLowerCase().includes('cita')) || '';
  const ciegas = (row[ciegasKey]||'').toLowerCase();
  // Find album column
  const albumKey = Object.keys(row).find(k => k.toLowerCase().includes('lbum')) || 'Album';
  // Find country column
  const countryKey = Object.keys(row).find(k => k.toLowerCase().includes('pa')) || 'Pais';
  // Find year column
  const yearKey = Object.keys(row).find(k => k.toLowerCase().includes('o') && k.length <= 4) || 'Ano';
  // Find genre column
  const genreKey = Object.keys(row).find(k => k.toLowerCase().includes('nero') && !k.toLowerCase().includes('sub')) || 'Genero';
  // Find subgenre column
  const subKey = Object.keys(row).find(k => k.toLowerCase().includes('sub')) || 'Subgenero';
  // Find duration column
  const durKey = Object.keys(row).find(k => k.toLowerCase().includes('dur')) || 'Duracion';
  
  return {
    id: parseInt(getVal(row,'ID','id')||0),
    ep: parseInt(getVal(row,'Episodio #','ep')||0),
    name: row[albumKey]||'',
    artist: getVal(row,'Artista','artist')||'',
    country: row[countryKey]||'',
    year: parseInt(row[yearKey]||0),
    genre: row[genreKey]||'',
    subgenre: row[subKey]||'',
    tracks: parseInt(getVal(row,'Tracks')||0),
    duration: parseInt(row[durKey]||0),
    c, k, v, a,
    score: parseFloat((c*0.4+k*0.25+v*0.25+a*0.1).toFixed(2)),
    citaCiegas: ciegas==='si' || ciegas==='sí',
    vibes: (getVal(row,'Vibes / Tags','vibes')||'').split(',').map(x=>x.trim()).filter(Boolean),
    cover: getVal(row,'Link Album','cover')||'',
    songs: [], songScores: []
  };
}

function mapTrack(row) {
  const nameKey = Object.keys(row).find(k => k.toLowerCase().includes('nombre')) || 'Nombre del Track';
  return {
    discoId: parseInt(getVal(row,'ID Disco','discoId')||0),
    num: parseInt(getVal(row,'# Track','num')||0),
    name: row[nameKey]||'',
    score: parseFloat(getVal(row,'Puntaje (1-10)','score')||0)
  };
}

async function fetchCSV(url) {
  const proxies = [
    `https://corsproxy.io/?${encodeURIComponent(url)}`,
    `https://api.allorigins.win/raw?url=${encodeURIComponent(url)}`,
    url
  ];
  for (const proxy of proxies) {
    try {
      const r = await fetch(proxy);
      if (r.ok) {
        const text = await r.text();
        if (text && !text.includes('error')) return text;
      }
    } catch(e) { continue; }
  }
  throw new Error('No se pudo cargar el CSV');
}

async function loadData() {
  try {
    const DISCOS_URL = "https://docs.google.com/spreadsheets/d/e/2PACX-1vSfk4sKvpc8V6HXbxKSoQFqMEt_F2mk8v5TUAQQF7SpFoiIIitB0XSf-LVc4FT8GWTt--L89q0SPyo8/pub?gid=0&single=true&output=csv";
    const TRACKS_URL = "https://docs.google.com/spreadsheets/d/e/2PACX-1vSfk4sKvpc8V6HXbxKSoQFqMEt_F2mk8v5TUAQQF7SpFoiIIitB0XSf-LVc4FT8GWTt--L89q0SPyo8/pub?gid=350466150&single=true&output=csv";
    
    const [discosCsv, tracksCsv] = await Promise.all([
      fetchCSV(DISCOS_URL),
      fetchCSV(TRACKS_URL)
    ]);
    
    DISCOS = parseCSV(discosCsv).map(mapDisco).filter(d => d.id > 0 && d.name);
    TRACKS = parseCSV(tracksCsv).map(mapTrack).filter(t => t.discoId > 0 && t.name);
    
    DISCOS.forEach(d => {
      const t = TRACKS.filter(x=>x.discoId===d.id).sort((a,b)=>a.num-b.num);
      d.songs = t.map(x=>x.name);
      d.songScores = t.map(x=>x.score);
    });
    return true;
  } catch(e) {
    console.error('Error cargando datos:', e);
    return false;
  }
}

loadData().then(() => {
  document.getElementById('loading').style.display = 'none';
});

</script>
