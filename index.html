<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Reseña del disco</title>
  <style>
@import url('https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,500;0,700;1,400&family=Inter:wght@300;400;500;600&display=swap');

/* =============================================
   VARIABLES GLOBALES
   ============================================= */
:root {
  --naranja: #D45E2A;
  --naranja-claro: #E8896A;
  --naranja-oscuro: #B84D1F;
  --beige: #F2EDE4;
  --beige-osc: #E8E0D4;
  --beige-borde: #DDD8CE;
  --negro: #1A1A1A;
  --texto-principal: #1A1A1A;
  --texto-secundario: #6A6460;
  --texto-terciario: #A09890;
  --texto-muted: #C4BDB5;
  --radio: 20px;
  --radio-lg: 28px;
}

/* =============================================
   RESET & BASE
   ============================================= */
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

html, body {
  height: 100%;
  font-family: 'Inter', sans-serif;
  background: var(--naranja);
  color: var(--texto-principal);
  -webkit-font-smoothing: antialiased;
}

/* =============================================
   LAYOUT PRINCIPAL
   ============================================= */
.app-shell {
  min-height: 100vh;
  display: flex;
  flex-direction: column;
  background: var(--naranja);
  padding: 12px;
  gap: 10px;
}

/* =============================================
   NAVEGACIÓN
   ============================================= */
.nav {
  display: flex;
  align-items: center;
  justify-content: space-between;
  padding: 10px 16px;
  background: var(--negro);
  border-radius: var(--radio);
}

.nav-brand {
  font-family: 'Playfair Display', serif;
  font-size: 14px;
  font-weight: 700;
  color: var(--beige);
  letter-spacing: 0.5px;
}

.nav-links {
  display: flex;
  gap: 4px;
}

.nav-link {
  font-size: 11px;
  font-weight: 500;
  color: var(--texto-terciario);
  text-decoration: none;
  padding: 6px 14px;
  border-radius: 10px;
  letter-spacing: 1px;
  text-transform: uppercase;
  transition: all 0.2s;
}

.nav-link:hover { color: var(--beige); background: rgba(255,255,255,0.06); }
.nav-link.active { background: var(--naranja); color: white; }

/* =============================================
   PANELS / CARDS
   ============================================= */
.panel {
  background: var(--beige);
  border-radius: var(--radio);
  padding: 14px;
}

.panel-dark {
  background: var(--beige);
  border: 2.5px solid var(--negro);
  border-radius: var(--radio);
  padding: 14px;
}

.panel-warm {
  background: var(--beige);
  border: 2.5px solid var(--naranja);
  border-radius: var(--radio);
  padding: 14px;
}

.panel-label {
  font-size: 9px;
  font-weight: 600;
  letter-spacing: 2.5px;
  text-transform: uppercase;
  color: var(--negro);
  margin-bottom: 10px;
}

/* =============================================
   STATS ROW
   ============================================= */
.stats-row {
  display: grid;
  grid-template-columns: repeat(4, 1fr);
  gap: 8px;
}

.stat {
  background: var(--beige);
  border-radius: 14px;
  padding: 10px 14px;
}

.stat-label {
  font-size: 8px;
  font-weight: 500;
  color: var(--texto-terciario);
  letter-spacing: 1.5px;
  text-transform: uppercase;
  margin-bottom: 2px;
}

.stat-val {
  font-family: 'Playfair Display', serif;
  font-size: 24px;
  font-weight: 700;
  color: var(--naranja-oscuro);
  line-height: 1;
}

/* =============================================
   BÚSQUEDA
   ============================================= */
.search-wrap {
  position: relative;
}

.search-wrap i {
  position: absolute;
  left: 12px;
  top: 50%;
  transform: translateY(-50%);
  font-size: 14px;
  color: var(--texto-terciario);
  pointer-events: none;
}

.search-wrap input {
  width: 100%;
  font-size: 12px;
  padding: 10px 12px 10px 34px;
  border-radius: 12px;
  border: none;
  background: var(--beige);
  color: var(--texto-principal);
  outline: none;
  font-family: 'Inter', sans-serif;
}

.search-wrap input::placeholder { color: var(--texto-muted); }
.search-wrap input:focus { box-shadow: 0 0 0 2px var(--naranja-claro); }

/* =============================================
   TABLA
   ============================================= */
.table-panel {
  background: var(--beige);
  border: 2.5px solid var(--negro);
  border-radius: var(--radio);
  overflow: hidden;
  position: relative;
}

.table-scroll {
  overflow-x: auto;
  overflow-y: auto;
  max-height: 400px;
}

.table-scroll::-webkit-scrollbar { width: 3px; height: 3px; }
.table-scroll::-webkit-scrollbar-track { background: var(--beige-borde); }
.table-scroll::-webkit-scrollbar-thumb { background: var(--naranja); border-radius: 2px; }

table { border-collapse: collapse; width: 100%; }
thead { position: sticky; top: 0; z-index: 10; }

thead th {
  background: var(--negro);
  color: var(--beige);
  font-size: 9px;
  font-weight: 600;
  letter-spacing: 1px;
  text-transform: uppercase;
  padding: 10px 8px;
  text-align: left;
  white-space: nowrap;
  cursor: pointer;
  user-select: none;
  position: relative;
}

thead th:hover { background: #2a2a2a; }
thead th.active-filter { color: var(--naranja-claro); }

tbody tr {
  border-bottom: 0.5px solid var(--beige-borde);
  cursor: pointer;
  transition: background 0.12s;
}

tbody tr:hover { background: var(--beige-osc); }

tbody tr.selected { background: var(--negro); }
tbody tr.selected td { color: var(--beige) !important; }
tbody tr.selected td.name { color: var(--naranja-claro) !important; }
tbody tr.selected td.final { color: var(--naranja-claro) !important; }

td {
  font-size: 11px;
  color: var(--texto-secundario);
  padding: 8px 8px;
  white-space: nowrap;
  overflow: hidden;
  text-overflow: ellipsis;
}

td.rank {
  color: var(--texto-muted);
  text-align: center;
  font-family: 'Playfair Display', serif;
  font-size: 12px;
}

td.name { color: var(--negro); font-weight: 500; max-width: 130px; }
td.num { text-align: center; }

td.final {
  font-weight: 700;
  color: var(--naranja-oscuro);
  text-align: center;
  font-family: 'Playfair Display', serif;
  font-size: 13px;
}

.mini-bar { height: 2px; background: var(--beige-borde); border-radius: 1px; margin-top: 3px; }
.mini-fill { height: 2px; background: var(--naranja); border-radius: 1px; opacity: 0.7; }
.no-results {
  padding: 2rem;
  text-align: center;
  font-size: 12px;
  color: var(--texto-terciario);
  font-style: italic;
  font-family: 'Playfair Display', serif;
}

/* =============================================
   DROPDOWN FILTRO (tipo Excel)
   ============================================= */
.filter-dropdown {
  position: absolute;
  top: 100%;
  left: 0;
  min-width: 190px;
  background: var(--negro);
  border: 1px solid #333;
  border-radius: 10px;
  padding: 8px;
  z-index: 200;
  box-shadow: 0 8px 24px rgba(0,0,0,0.5);
  display: none;
}

.filter-dropdown.open { display: block; }

.dd-search {
  width: 100%;
  font-size: 10px;
  padding: 5px 8px;
  border-radius: 6px;
  border: 0.5px solid #333;
  background: #111;
  color: #ccc;
  outline: none;
  margin-bottom: 6px;
  font-family: 'Inter', sans-serif;
}

.dd-search::placeholder { color: #555; }
.dd-search:focus { border-color: var(--naranja); }

.dd-actions { display: flex; gap: 8px; margin-bottom: 6px; }
.dd-action { font-size: 9px; color: #888; cursor: pointer; text-decoration: underline; }
.dd-action:hover { color: var(--naranja-claro); }

.dd-list { max-height: 150px; overflow-y: auto; display: flex; flex-direction: column; gap: 2px; }
.dd-list::-webkit-scrollbar { width: 3px; }
.dd-list::-webkit-scrollbar-thumb { background: var(--naranja); border-radius: 2px; }

.dd-item { display: flex; align-items: center; gap: 6px; padding: 4px 5px; border-radius: 5px; cursor: pointer; }
.dd-item:hover { background: #2a2a2a; }
.dd-item input[type=checkbox] { accent-color: var(--naranja); cursor: pointer; width: 12px; height: 12px; flex-shrink: 0; }
.dd-item label { font-size: 10px; color: #ccc; cursor: pointer; white-space: nowrap; }

.dd-apply {
  width: 100%;
  margin-top: 8px;
  background: var(--naranja);
  color: white;
  border: none;
  padding: 6px;
  border-radius: 6px;
  font-size: 10px;
  font-family: 'Inter', sans-serif;
  cursor: pointer;
  letter-spacing: 0.5px;
  font-weight: 500;
}

.dd-apply:hover { background: var(--naranja-oscuro); }

/* =============================================
   SCROLLBAR GLOBAL
   ============================================= */
.custom-scroll::-webkit-scrollbar { width: 3px; }
.custom-scroll::-webkit-scrollbar-track { background: var(--beige-borde); border-radius: 2px; }
.custom-scroll::-webkit-scrollbar-thumb { background: var(--naranja); border-radius: 2px; }

/* =============================================
   BOTONES
   ============================================= */
.btn-dark {
  background: var(--negro);
  color: var(--beige);
  border: none;
  padding: 10px 20px;
  border-radius: 10px;
  font-size: 11px;
  font-family: 'Inter', sans-serif;
  font-weight: 500;
  letter-spacing: 1px;
  text-transform: uppercase;
  cursor: pointer;
  transition: background 0.2s;
}
.btn-dark:hover { background: #2a2a2a; }
.btn-dark:disabled { opacity: 0.3; cursor: default; }

.btn-outline {
  background: transparent;
  color: var(--texto-terciario);
  border: 1.5px solid var(--beige-borde);
  padding: 10px 16px;
  border-radius: 10px;
  font-size: 11px;
  font-family: 'Inter', sans-serif;
  letter-spacing: 1px;
  text-transform: uppercase;
  cursor: pointer;
  transition: all 0.2s;
}
.btn-outline:hover { border-color: var(--texto-terciario); color: var(--texto-secundario); }

.app-shell { height: 100vh; display: flex; flex-direction: column; overflow: hidden; }
.page-grid { flex: 1; min-height: 0; display: grid; grid-template-columns: 210px 1fr; gap: 12px; overflow: hidden; }
.left-card { min-height: 0; overflow: hidden; }
.card-info { flex: 1; min-height: 0; overflow-y: auto; }
.right-col { min-height: 0; overflow: hidden; }
.panel-dark { flex: 1; min-height: 0; display: flex; flex-direction: column; overflow: hidden; }
.panel-warm { flex: 1; min-height: 0; display: flex; flex-direction: column; overflow: hidden; }
.top-list { flex: 1; overflow-y: auto; min-height: 0; }
.top-list::-webkit-scrollbar { width: 3px; }
.top-list::-webkit-scrollbar-thumb { background: var(--naranja); border-radius: 2px; }
.analysis-wrap { flex: 1; min-height: 0; overflow: hidden; }
.tracks-col { max-height: 100%; overflow-y: auto; }
.loading-screen { position: fixed; inset: 0; background: var(--naranja); display: flex; flex-direction: column; align-items: center; justify-content: center; gap: 12px; z-index: 999; }
.loading-title { font-family: 'Playfair Display', serif; font-size: 22px; color: #F2EDE4; }
.loading-sub { font-size: 11px; color: rgba(242,237,228,0.6); letter-spacing: 2px; text-transform: uppercase; }
.spinner { width: 32px; height: 32px; border: 2px solid rgba(242,237,228,0.2); border-top-color: #F2EDE4; border-radius: 50%; animation: spin 0.8s linear infinite; }
@keyframes spin { to { transform: rotate(360deg); } }

                <circle id="r3" cx="0" cy="0" r="3.5" fill="#B84D1F"/>
                <circle id="r4" cx="0" cy="0" r="3.5" fill="#B84D1F"/>
                <text x="0" y="-67" text-anchor="middle" font-size="8" fill="#6A6460" font-family="Inter,sans-serif" font-weight="500">canciones</text>
                <text x="68" y="-15" text-anchor="start" font-size="8" fill="#6A6460" font-family="Inter,sans-serif" font-weight="500">concepto</text>
                <text x="36" y="66" text-anchor="middle" font-size="8" fill="#6A6460" font-family="Inter,sans-serif" font-weight="500">visual</text>
                <text x="-36" y="66" text-anchor="middle" font-size="8" fill="#6A6460" font-family="Inter,sans-serif" font-weight="500">adicional</text>
                <text x="-68" y="-15" text-anchor="end" font-size="8" fill="#6A6460" font-family="Inter,sans-serif" font-weight="500">duración</text>
              </g>
            </svg>
          </div>
          <div class="tracks-col" id="tracks-col"></div>
        </div>
      </div>
    </div>
  </div>
</div>

<script>

const DISCOS_URL = "https://allorigins.win/raw?url=https://docs.google.com/spreadsheets/d/e/2PACX-1vSfk4sKvpc8V6HXbxKSoQFqMEt_F2mk8v5TUAQQF7SpFoiIIitB0XSf-LVc4FT8GWTt--L89q0SPyo8/pub?gid=0&single=true&output=csv";
const TRACKS_URL = "https://allorigins.win/raw?url=https://docs.google.com/spreadsheets/d/e/2PACX-1vSfk4sKvpc8V6HXbxKSoQFqMEt_F2mk8v5TUAQQF7SpFoiIIitB0XSf-LVc4FT8GWTt--L89q0SPyo8/pub?gid=350466150&single=true&output=csv";
let DISCOS = [];
let TRACKS = [];

const APP = {
  selectedDisco: null,
  setSelected(disco) {
    this.selectedDisco = disco;
    try { localStorage.setItem('selectedDisco', disco ? String(disco.id) : null); } catch(e) {}
  },
  getSelected() {
    try {
      const id = localStorage.getItem('selectedDisco');
      return id ? (DISCOS.find(d => d.id === parseInt(id)) || DISCOS[0]) : DISCOS[0];
    } catch(e) { return DISCOS[0]; }
  }
};

function parseCSV(text) {
  const lines = text.trim().split('
');
  const headers = lines[0].split(',').map(h => h.trim().replace(/^"|"$/g,''));
  return lines.slice(1).map(line => {
    const vals = []; let cur = '', inQ = false;
    for (let ch of line) {
      if (ch==='"') inQ=!inQ;
      else if (ch===',' && !inQ) { vals.push(cur.trim()); cur=''; }
      else cur+=ch;
    }
    vals.push(cur.trim());
    const obj = {};
    headers.forEach((h,i) => obj[h] = (vals[i]||'').replace(/^"|"$/g,''));
    return obj;
  }).filter(r => r[headers[0]] && r[headers[0]].trim());
}

function mapDisco(row) {
  const c = parseFloat(row['Punt. Canciones (40%)']||0);
  const k = parseFloat(row['Punt. Concepto (25%)']||0);
  const v = parseFloat(row['Punt. Visual (25%)']||0);
  const a = parseFloat(row['Pts. Adicionales (10%)']||0);
  const ciegas = (row['Cita a Ciegas (Sí/No)']||'').toLowerCase();
  return {
    id: parseInt(row['ID']||0),
    ep: parseInt(row['Episodio #']||0),
    name: row['Álbum']||'',
    artist: row['Artista']||'',
    country: row['País']||'',
    year: parseInt(row['Año']||0),
    genre: row['Género']||'',
    subgenre: row['Subgénero']||'',
    tracks: parseInt(row['Tracks']||0),
    duration: parseInt(row['Duración (min)']||0),
    c, k, v, a,
    score: parseFloat((c*0.4+k*0.25+v*0.25+a*0.1).toFixed(2)),
    citaCiegas: ciegas==='sí'||ciegas==='si',
    vibes: (row['Vibes / Tags']||'').split(',').map(x=>x.trim()).filter(Boolean),
    cover: row['Link Album']||'',
    songs: [], songScores: []
  };
}

function mapTrack(row) {
  return {
    discoId: parseInt(row['ID Disco']||0),
    num: parseInt(row['# Track']||0),
    name: row['Nombre del Track']||'',
    score: parseFloat(row['Puntaje (1-10)']||0)
  };
}

async function loadData() {
  const [dr, tr] = await Promise.all([fetch(DISCOS_URL), fetch(TRACKS_URL)]);
  const [dc, tc] = await Promise.all([dr.text(), tr.text()]);
  DISCOS = parseCSV(dc).map(mapDisco);
  TRACKS = parseCSV(tc).map(mapTrack);
  DISCOS.forEach(d => {
    const t = TRACKS.filter(x=>x.discoId===d.id).sort((a,b)=>a.num-b.num);
    d.songs = t.map(x=>x.name);
    d.songScores = t.map(x=>x.score);
  });
}

</script>
<script>
const sorted = [...DISCOS].sort((a,b) => b.score - a.score);
let current = APP.getSelected();

const AXES = [[0,-60],[51.9,-19],[32.1,49.9],[-32.1,49.9],[-51.9,-19]];

function updateRadar(d) {
  const vals = [d.c/10, d.k/10, d.v/10, d.a/10, Math.min(d.duration/60, 1)];
  const pts = AXES.map(([ax,ay],i) => `${ax*vals[i]},${ay*vals[i]}`).join(' ');
  document.getElementById('radar-poly').setAttribute('points', pts);
  AXES.forEach(([ax,ay],i) => {
    document.getElementById('r'+i).setAttribute('cx', ax*vals[i]);
    document.getElementById('r'+i).setAttribute('cy', ay*vals[i]);
  });
}

function updateCard(d) {
  current = d;
  APP.setSelected(d);
  document.getElementById('c-name').textContent = d.name;
  document.getElementById('c-artist').textContent = d.artist;
  document.getElementById('c-year').textContent = d.year;
  document.getElementById('c-country').textContent = d.country;
  document.getElementById('c-genre').textContent = d.genre;
  document.getElementById('c-tracks').textContent = d.tracks;
  document.getElementById('c-duration').textContent = d.duration + ' min';
  document.getElementById('c-ep').textContent = '#' + d.ep;
  const coverEl = document.getElementById('cover');
  if (d.cover) {
    coverEl.innerHTML = '<img src="' + d.cover + '" alt="' + d.name + '" onerror="this.parentElement.innerHTML=\'<i class=\"ti ti-vinyl\"></i>\'"/>';
  } else {
    coverEl.innerHTML = '<i class="ti ti-vinyl" aria-hidden="true"></i>';
  }
  document.getElementById('c-score').textContent = d.score.toFixed(2);
  document.getElementById('b-c').style.width = (d.c*10)+'%';
  document.getElementById('b-k').style.width = (d.k*10)+'%';
  document.getElementById('b-v').style.width = (d.v*10)+'%';
  document.getElementById('b-a').style.width = (d.a*10)+'%';
  document.getElementById('v-c').textContent = d.c.toFixed(1);
  document.getElementById('v-k').textContent = d.k.toFixed(1);
  document.getElementById('v-v').textContent = d.v.toFixed(1);
  document.getElementById('v-a').textContent = d.a.toFixed(1);
  updateRadar(d);
  document.getElementById('tracks-col').innerHTML = d.songs.map((s,i) => `
    <div class="track">
      <span class="track-num">${i+1}</span>
      <span class="track-name" title="${s}">${s}</span>
      <div class="track-bar-wrap"><div class="track-bar" style="width:${d.songScores[i]*10}%"></div></div>
      <span class="track-val">${d.songScores[i].toFixed(1)}</span>
    </div>`).join('');
  document.querySelectorAll('.top-row').forEach(r => r.classList.toggle('active', r.dataset.id === String(d.id)));
}

function buildTop() {
  document.getElementById('top-list').innerHTML = sorted.slice(0,10).map((d,i) => `
    <div class="top-row${d.id === current.id ? ' active':''}" data-id="${d.id}" onclick="updateCard(DISCOS.find(x=>x.id===${d.id}))">
      <span class="top-num">${i+1}</span>
      <span class="top-name">${d.name}</span>
      <span class="top-artist">${d.artist}</span>
      <div class="top-bar-wrap"><div class="top-bar" style="width:${Math.round(d.score/sorted[0].score*100)}%"></div></div>
      <span class="top-val">${d.score.toFixed(2)}</span>
    </div>`).join('');
}


loadData().then(() => {
  document.getElementById('loading').style.display = 'none';
  current = APP.getSelected();
  buildTop();
  updateCard(current);
});

</script>
</body>
</html>
