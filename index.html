<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Reseña del disco</title>
  <style>
@import url('https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,500;0,700;1,400&family=Inter:wght@300;400;500;600&display=swap');

/* =============================================
   VARIABLES GLOBALES
   ============================================= */
:root {
  --naranja: #D45E2A;
  --naranja-claro: #E8896A;
  --naranja-oscuro: #B84D1F;
  --beige: #F2EDE4;
  --beige-osc: #E8E0D4;
  --beige-borde: #DDD8CE;
  --negro: #1A1A1A;
  --texto-principal: #1A1A1A;
  --texto-secundario: #6A6460;
  --texto-terciario: #A09890;
  --texto-muted: #C4BDB5;
  --radio: 20px;
  --radio-lg: 28px;
}

/* =============================================
   RESET & BASE
   ============================================= */
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

html, body {
  height: 100%;
  font-family: 'Inter', sans-serif;
  background: var(--naranja);
  color: var(--texto-principal);
  -webkit-font-smoothing: antialiased;
}

/* =============================================
   LAYOUT PRINCIPAL
   ============================================= */
.app-shell {
  min-height: 100vh;
  display: flex;
  flex-direction: column;
  background: var(--naranja);
  padding: 12px;
  gap: 10px;
}

/* =============================================
   NAVEGACIÓN
   ============================================= */
.nav {
  display: flex;
  align-items: center;
  justify-content: space-between;
  padding: 10px 16px;
  background: var(--negro);
  border-radius: var(--radio);
}

.nav-brand {
  font-family: 'Playfair Display', serif;
  font-size: 14px;
  font-weight: 700;
  color: var(--beige);
  letter-spacing: 0.5px;
}

.nav-links {
  display: flex;
  gap: 4px;
}

.nav-link {
  font-size: 11px;
  font-weight: 500;
  color: var(--texto-terciario);
  text-decoration: none;
  padding: 6px 14px;
  border-radius: 10px;
  letter-spacing: 1px;
  text-transform: uppercase;
  transition: all 0.2s;
}

.nav-link:hover { color: var(--beige); background: rgba(255,255,255,0.06); }
.nav-link.active { background: var(--naranja); color: white; }

/* =============================================
   PANELS / CARDS
   ============================================= */
.panel {
  background: var(--beige);
  border-radius: var(--radio);
  padding: 14px;
}

.panel-dark {
  background: var(--beige);
  border: 2.5px solid var(--negro);
  border-radius: var(--radio);
  padding: 14px;
}

.panel-warm {
  background: var(--beige);
  border: 2.5px solid var(--naranja);
  border-radius: var(--radio);
  padding: 14px;
}

.panel-label {
  font-size: 9px;
  font-weight: 600;
  letter-spacing: 2.5px;
  text-transform: uppercase;
  color: var(--negro);
  margin-bottom: 10px;
}

/* =============================================
   STATS ROW
   ============================================= */
.stats-row {
  display: grid;
  grid-template-columns: repeat(4, 1fr);
  gap: 8px;
}

.stat {
  background: var(--beige);
  border-radius: 14px;
  padding: 10px 14px;
}

.stat-label {
  font-size: 8px;
  font-weight: 500;
  color: var(--texto-terciario);
  letter-spacing: 1.5px;
  text-transform: uppercase;
  margin-bottom: 2px;
}

.stat-val {
  font-family: 'Playfair Display', serif;
  font-size: 24px;
  font-weight: 700;
  color: var(--naranja-oscuro);
  line-height: 1;
}

/* =============================================
   BÚSQUEDA
   ============================================= */
.search-wrap {
  position: relative;
}

.search-wrap i {
  position: absolute;
  left: 12px;
  top: 50%;
  transform: translateY(-50%);
  font-size: 14px;
  color: var(--texto-terciario);
  pointer-events: none;
}

.search-wrap input {
  width: 100%;
  font-size: 12px;
  padding: 10px 12px 10px 34px;
  border-radius: 12px;
  border: none;
  background: var(--beige);
  color: var(--texto-principal);
  outline: none;
  font-family: 'Inter', sans-serif;
}

.search-wrap input::placeholder { color: var(--texto-muted); }
.search-wrap input:focus { box-shadow: 0 0 0 2px var(--naranja-claro); }

/* =============================================
   TABLA
   ============================================= */
.table-panel {
  background: var(--beige);
  border: 2.5px solid var(--negro);
  border-radius: var(--radio);
  overflow: hidden;
  position: relative;
}

.table-scroll {
  overflow-x: auto;
  overflow-y: auto;
  max-height: 400px;
}

.table-scroll::-webkit-scrollbar { width: 3px; height: 3px; }
.table-scroll::-webkit-scrollbar-track { background: var(--beige-borde); }
.table-scroll::-webkit-scrollbar-thumb { background: var(--naranja); border-radius: 2px; }

table { border-collapse: collapse; width: 100%; }
thead { position: sticky; top: 0; z-index: 10; }

thead th {
  background: var(--negro);
  color: var(--beige);
  font-size: 9px;
  font-weight: 600;
  letter-spacing: 1px;
  text-transform: uppercase;
  padding: 10px 8px;
  text-align: left;
  white-space: nowrap;
  cursor: pointer;
  user-select: none;
  position: relative;
}

thead th:hover { background: #2a2a2a; }
thead th.active-filter { color: var(--naranja-claro); }

tbody tr {
  border-bottom: 0.5px solid var(--beige-borde);
  cursor: pointer;
  transition: background 0.12s;
}

tbody tr:hover { background: var(--beige-osc); }

tbody tr.selected { background: var(--negro); }
tbody tr.selected td { color: var(--beige) !important; }
tbody tr.selected td.name { color: var(--naranja-claro) !important; }
tbody tr.selected td.final { color: var(--naranja-claro) !important; }

td {
  font-size: 11px;
  color: var(--texto-secundario);
  padding: 8px 8px;
  white-space: nowrap;
  overflow: hidden;
  text-overflow: ellipsis;
}

td.rank {
  color: var(--texto-muted);
  text-align: center;
  font-family: 'Playfair Display', serif;
  font-size: 12px;
}

td.name { color: var(--negro); font-weight: 500; max-width: 130px; }
td.num { text-align: center; }

td.final {
  font-weight: 700;
  color: var(--naranja-oscuro);
  text-align: center;
  font-family: 'Playfair Display', serif;
  font-size: 13px;
}

.mini-bar { height: 2px; background: var(--beige-borde); border-radius: 1px; margin-top: 3px; }
.mini-fill { height: 2px; background: var(--naranja); border-radius: 1px; opacity: 0.7; }
.no-results {
  padding: 2rem;
  text-align: center;
  font-size: 12px;
  color: var(--texto-terciario);
  font-style: italic;
  font-family: 'Playfair Display', serif;
}

/* =============================================
   DROPDOWN FILTRO (tipo Excel)
   ============================================= */
.filter-dropdown {
  position: absolute;
  top: 100%;
  left: 0;
  min-width: 190px;
  background: var(--negro);
  border: 1px solid #333;
  border-radius: 10px;
  padding: 8px;
  z-index: 200;
  box-shadow: 0 8px 24px rgba(0,0,0,0.5);
  display: none;
}

.filter-dropdown.open { display: block; }

.dd-search {
  width: 100%;
  font-size: 10px;
  padding: 5px 8px;
  border-radius: 6px;
  border: 0.5px solid #333;
  background: #111;
  color: #ccc;
  outline: none;
  margin-bottom: 6px;
  font-family: 'Inter', sans-serif;
}

.dd-search::placeholder { color: #555; }
.dd-search:focus { border-color: var(--naranja); }

.dd-actions { display: flex; gap: 8px; margin-bottom: 6px; }
.dd-action { font-size: 9px; color: #888; cursor: pointer; text-decoration: underline; }
.dd-action:hover { color: var(--naranja-claro); }

.dd-list { max-height: 150px; overflow-y: auto; display: flex; flex-direction: column; gap: 2px; }
.dd-list::-webkit-scrollbar { width: 3px; }
.dd-list::-webkit-scrollbar-thumb { background: var(--naranja); border-radius: 2px; }

.dd-item { display: flex; align-items: center; gap: 6px; padding: 4px 5px; border-radius: 5px; cursor: pointer; }
.dd-item:hover { background: #2a2a2a; }
.dd-item input[type=checkbox] { accent-color: var(--naranja); cursor: pointer; width: 12px; height: 12px; flex-shrink: 0; }
.dd-item label { font-size: 10px; color: #ccc; cursor: pointer; white-space: nowrap; }

.dd-apply {
  width: 100%;
  margin-top: 8px;
  background: var(--naranja);
  color: white;
  border: none;
  padding: 6px;
  border-radius: 6px;
  font-size: 10px;
  font-family: 'Inter', sans-serif;
  cursor: pointer;
  letter-spacing: 0.5px;
  font-weight: 500;
}

.dd-apply:hover { background: var(--naranja-oscuro); }

/* =============================================
   SCROLLBAR GLOBAL
   ============================================= */
.custom-scroll::-webkit-scrollbar { width: 3px; }
.custom-scroll::-webkit-scrollbar-track { background: var(--beige-borde); border-radius: 2px; }
.custom-scroll::-webkit-scrollbar-thumb { background: var(--naranja); border-radius: 2px; }

/* =============================================
   BOTONES
   ============================================= */
.btn-dark {
  background: var(--negro);
  color: var(--beige);
  border: none;
  padding: 10px 20px;
  border-radius: 10px;
  font-size: 11px;
  font-family: 'Inter', sans-serif;
  font-weight: 500;
  letter-spacing: 1px;
  text-transform: uppercase;
  cursor: pointer;
  transition: background 0.2s;
}
.btn-dark:hover { background: #2a2a2a; }
.btn-dark:disabled { opacity: 0.3; cursor: default; }

.btn-outline {
  background: transparent;
  color: var(--texto-terciario);
  border: 1.5px solid var(--beige-borde);
  padding: 10px 16px;
  border-radius: 10px;
  font-size: 11px;
  font-family: 'Inter', sans-serif;
  letter-spacing: 1px;
  text-transform: uppercase;
  cursor: pointer;
  transition: all 0.2s;
}
.btn-outline:hover { border-color: var(--texto-terciario); color: var(--texto-secundario); }

.app-shell { height: 100vh; display: flex; flex-direction: column; overflow: hidden; }
.page-grid { flex: 1; min-height: 0; display: grid; grid-template-columns: 210px 1fr; gap: 12px; overflow: hidden; }
.left-card { min-height: 0; overflow: hidden; }
.card-info { flex: 1; min-height: 0; overflow-y: auto; }
.right-col { min-height: 0; overflow: hidden; }
.panel-dark { flex: 1; min-height: 0; display: flex; flex-direction: column; overflow: hidden; }
.panel-warm { flex: 1; min-height: 0; display: flex; flex-direction: column; overflow: hidden; }
.top-list { flex: 1; overflow-y: auto; min-height: 0; }
.top-list::-webkit-scrollbar { width: 3px; }
.top-list::-webkit-scrollbar-thumb { background: var(--naranja); border-radius: 2px; }
.analysis-wrap { flex: 1; min-height: 0; overflow: hidden; }
.tracks-col { max-height: 100%; overflow-y: auto; }
.loading-screen { position: fixed; inset: 0; background: var(--naranja); display: flex; flex-direction: column; align-items: center; justify-content: center; gap: 12px; z-index: 999; }
.loading-title { font-family: 'Playfair Display', serif; font-size: 22px; color: #F2EDE4; }
.loading-sub { font-size: 11px; color: rgba(242,237,228,0.6); letter-spacing: 2px; text-transform: uppercase; }
.spinner { width: 32px; height: 32px; border: 2px solid rgba(242,237,228,0.2); border-top-color: #F2EDE4; border-radius: 50%; animation: spin 0.8s linear infinite; }
@keyframes spin { to { transform: rotate(360deg); } }

<script>


let DISCOS = [];
let TRACKS = [];

const FALLBACK_DISCOS = [
  { id:1, ep:1, name:"Revolver", artist:"The Beatles", country:"Reino Unido", year:1966, genre:"Rock psicodélico", subgenre:"Psicodélico", tracks:14, duration:35, c:9.0, k:8.5, v:8.0, a:7.5, citaCiegas:false, vibes:[], cover:"", songs:["Taxman","Eleanor Rigby","I'm Only Sleeping","Love You To","Here, There and Everywhere","Yellow Submarine","She Said She Said","Good Day Sunshine","And Your Bird Can Sing","For No One","Doctor Robert","I Want to Tell You","Got to Get You into My Life","Tomorrow Never Knows"], songScores:[9.5,10,8,7,9,6.5,8.5,7.5,7.8,8.8,7.2,8.2,8.7,10] },
  { id:2, ep:2, name:"Kind of Blue", artist:"Miles Davis", country:"Estados Unidos", year:1959, genre:"Jazz modal", subgenre:"Modal Jazz", tracks:5, duration:45, c:8.0, k:9.0, v:7.5, a:8.0, citaCiegas:true, vibes:["melancólico","nocturno","intimista","contemplativo"], cover:"", songs:["So What","Freddie Freeloader","Blue in Green","All Blues","Flamenco Sketches"], songScores:[9.5,8.5,9,8.5,9] },
  { id:3, ep:3, name:"Rumours", artist:"Fleetwood Mac", country:"Reino Unido", year:1977, genre:"Soft Rock", subgenre:"Soft Rock", tracks:11, duration:40, c:8.5, k:7.5, v:8.5, a:6.0, citaCiegas:false, vibes:[], cover:"", songs:["Second Hand News","Dreams","Never Going Back","The Chain","You Make Loving Fun","I Don't Want to Know","Oh Daddy","Gold Dust Woman","Go Your Own Way","Songbird","The Chain (Reprise)"], songScores:[8,9.5,7.5,9,8,7.5,7,8.5,9,8.5,7] },
  { id:4, ep:4, name:"Innervisions", artist:"Stevie Wonder", country:"Estados Unidos", year:1973, genre:"Funk Soul", subgenre:"Funk Soul", tracks:9, duration:44, c:9.0, k:8.0, v:7.0, a:9.0, citaCiegas:true, vibes:["psicodélico","funk","introspectivo","colorido"], cover:"", songs:["Too High","Visions","Living for the City","Golden Lady","Higher Ground","Jesus Children of America","All in Love is Fair","Don't You Worry 'Bout a Thing","He's Misstra Know-It-All"], songScores:[8,8.5,10,8.5,9.5,7.5,8,8.5,8] },
  { id:5, ep:5, name:"Blue", artist:"Joni Mitchell", country:"Canadá", year:1971, genre:"Folk Rock", subgenre:"Folk Rock", tracks:10, duration:36, c:8.0, k:9.0, v:6.5, a:7.0, citaCiegas:false, vibes:[], cover:"", songs:["All I Want","My Old Man","Little Green","Carey","Blue","California","This Flight Tonight","River","A Case of You","The Last Time I Saw Richard"], songScores:[8.5,8,8,8.5,9,9,7.5,9.5,10,8] },
  { id:6, ep:6, name:"Thriller", artist:"Michael Jackson", country:"Estados Unidos", year:1982, genre:"Pop / R&B", subgenre:"Pop / R&B", tracks:9, duration:42, c:8.5, k:7.0, v:9.0, a:8.0, citaCiegas:false, vibes:[], cover:"", songs:["Wanna Be Startin' Somethin'","Baby Be Mine","The Girl Is Mine","Thriller","Beat It","Billie Jean","Human Nature","P.Y.T.","The Lady in My Life"], songScores:[9,7.5,7,10,9.5,10,8,8,7.5] },
  { id:7, ep:7, name:"What's Going On", artist:"Marvin Gaye", country:"Estados Unidos", year:1971, genre:"Soul / Funk", subgenre:"Soul / Funk", tracks:9, duration:35, c:9.5, k:9.5, v:7.0, a:8.0, citaCiegas:true, vibes:["espiritual","cálido","político","envolvente"], cover:"", songs:["What's Going On","What's Happening Brother","Flyin' High","Save the Children","God Is Love","Mercy Mercy Me","Right On","Wholy Holy","Inner City Blues"], songScores:[10,8.5,8.5,9,8.5,9.5,8,8.5,9.5] },
  { id:8, ep:8, name:"Graceland", artist:"Paul Simon", country:"Estados Unidos", year:1986, genre:"World Music", subgenre:"World Music", tracks:11, duration:42, c:7.5, k:8.0, v:6.5, a:6.0, citaCiegas:false, vibes:[], cover:"", songs:["The Boy in the Bubble","Graceland","I Know What I Know","Gumboots","Diamonds on the Soles","You Can Call Me Al","Under African Skies","Homeless","Crazy Love Vol. II","That Was Your Mother","All Around the World"], songScores:[8.5,9,7.5,7,8,9.5,8,8.5,7.5,7,8] },
  { id:9, ep:9, name:"Exodus", artist:"Bob Marley", country:"Jamaica", year:1977, genre:"Roots Reggae", subgenre:"Roots Reggae", tracks:10, duration:37, c:8.0, k:8.5, v:8.0, a:7.5, citaCiegas:false, vibes:[], cover:"", songs:["Natural Mystic","So Much Things to Say","Guiltiness","The Heathen","Exodus","Jamming","Waiting in Vain","Turn Your Lights Down Low","Three Little Birds","One Love"], songScores:[8.5,8,8,8,9.5,9,9,8.5,8.5,9] },
  { id:10, ep:10, name:"Off the Wall", artist:"Michael Jackson", country:"Estados Unidos", year:1979, genre:"Disco Funk", subgenre:"Disco Funk", tracks:10, duration:41, c:8.0, k:7.5, v:7.5, a:7.0, citaCiegas:true, vibes:["bailable","festivo","elegante","groovy"], cover:"", songs:["Don't Stop 'Til You Get Enough","Rock With You","Workin' Day and Night","Get on the Floor","Off the Wall","Girlfriend","She's Out of My Life","I Can't Help It","It's the Falling in Love","Burn This Disco Out"], songScores:[9.5,9.5,8,8,8.5,7,8.5,7.5,7,7.5] }
];
FALLBACK_DISCOS.forEach(d => { d.score = parseFloat((d.c*0.4+d.k*0.25+d.v*0.25+d.a*0.1).toFixed(2)); });

const APP = {
  setSelected(disco) {
    try { localStorage.setItem('selectedDisco', disco ? String(disco.id) : null); } catch(e) {}
  },
  getSelected() {
    try {
      const id = localStorage.getItem('selectedDisco');
      return id ? (DISCOS.find(d => d.id === parseInt(id)) || DISCOS[0]) : DISCOS[0];
    } catch(e) { return DISCOS[0]; }
  }
};

function parseCSV(text) {
  const lines = text.trim().split('\n');
  const headers = lines[0].split(',').map(h => h.trim().replace(/^"|"$/g,''));
  return lines.slice(1).map(line => {
    const vals = []; let cur = '', inQ = false;
    for (let ch of line) {
      if (ch==='"') inQ=!inQ;
      else if (ch===',' && !inQ) { vals.push(cur.trim()); cur=''; }
      else cur+=ch;
    }
    vals.push(cur.trim());
    const obj = {};
    headers.forEach((h,i) => obj[h] = (vals[i]||'').replace(/^"|"$/g,''));
    return obj;
  }).filter(r => Object.values(r).some(v => v && v.trim()));
}

function getKey(row, part) {
  const key = Object.keys(row).find(k => k.toLowerCase().includes(part.toLowerCase()));
  return key ? row[key] : '';
}

function mapDisco(row) {
  const c = parseFloat(getKey(row,'Canciones')||0);
  const k = parseFloat(getKey(row,'Concepto')||0);
  const v = parseFloat(getKey(row,'Visual')||0);
  const a = parseFloat(getKey(row,'Adicionales')||0);
  const ciegas = (getKey(row,'Cita')||'').toLowerCase();
  return {
    id: parseInt(getKey(row,'ID')||0),
    ep: parseInt(getKey(row,'Episodio')||0),
    name: getKey(row,'lbum')||'',
    artist: getKey(row,'Artista')||'',
    country: getKey(row,'Pa')||'',
    year: parseInt(getKey(row,'o')||0),
    genre: getKey(row,'nero')||'',
    subgenre: getKey(row,'Sub')||'',
    tracks: parseInt(getKey(row,'Tracks')||0),
    duration: parseInt(getKey(row,'Dur')||0),
    c, k, v, a,
    score: parseFloat((c*0.4+k*0.25+v*0.25+a*0.1).toFixed(2)),
    citaCiegas: ciegas.includes('si'),
    vibes: (getKey(row,'Vibes')||getKey(row,'Tags')||'').split(',').map(x=>x.trim()).filter(Boolean),
    cover: getKey(row,'Link')||'',
    songs: [], songScores: []
  };
}

function mapTrack(row) {
  return {
    discoId: parseInt(getKey(row,'ID')||0),
    num: parseInt(getKey(row,'Track')||0),
    name: getKey(row,'Nombre')||'',
    score: parseFloat(getKey(row,'Puntaje')||0)
  };
}

async function loadData() {
  // Carga instantánea con datos locales — nunca se queda trabado
  DISCOS = JSON.parse(JSON.stringify(FALLBACK_DISCOS));

  // Intenta actualizar desde Google Sheets en background
  const DISCOS_URL = "https://docs.google.com/spreadsheets/d/e/2PACX-1vSfk4sKvpc8V6HXbxKSoQFqMEt_F2mk8v5TUAQQF7SpFoiIIitB0XSf-LVc4FT8GWTt--L89q0SPyo8/pub?gid=0&single=true&output=csv";
  const TRACKS_URL = "https://docs.google.com/spreadsheets/d/e/2PACX-1vSfk4sKvpc8V6HXbxKSoQFqMEt_F2mk8v5TUAQQF7SpFoiIIitB0XSf-LVc4FT8GWTt--L89q0SPyo8/pub?gid=350466150&single=true&output=csv";
  const proxies = [
    url => `https://corsproxy.io/?${encodeURIComponent(url)}`,
    url => `https://api.allorigins.win/raw?url=${encodeURIComponent(url)}`,
  ];

  setTimeout(async () => {
    for (const proxy of proxies) {
      try {
        const [dr, tr] = await Promise.all([
          fetch(proxy(DISCOS_URL), {signal: AbortSignal.timeout(6000)}),
          fetch(proxy(TRACKS_URL), {signal: AbortSignal.timeout(6000)})
        ]);
        if (!dr.ok) continue;
        const [dc, tc] = await Promise.all([dr.text(), tr.text()]);
        const newDiscos = parseCSV(dc).map(mapDisco).filter(d => d.id > 0 && d.name);
        if (newDiscos.length === 0) continue;
        const newTracks = parseCSV(tc).map(mapTrack).filter(t => t.discoId > 0);
        newDiscos.forEach(d => {
          const t = newTracks.filter(x=>x.discoId===d.id).sort((a,b)=>a.num-b.num);
          if (t.length) { d.songs=t.map(x=>x.name); d.songScores=t.map(x=>x.score); }
        });
        DISCOS = newDiscos;
        TRACKS = newTracks;
        console.log('Sheets actualizado OK');
        break;
      } catch(e) { continue; }
    }
  }, 200);

  return true;
}


loadData().then(() => {
  document.getElementById('loading').style.display = 'none';
  current = APP.getSelected();
  buildTop();
  updateCard(current);
});

</script>
